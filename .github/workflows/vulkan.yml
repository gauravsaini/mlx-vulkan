name: Vulkan Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Ubuntu 22.04 + lavapipe)
    runs-on: ubuntu-22.04

    env:
      # Point Vulkan loader at lavapipe (software CPU-based ICD).
      # Must be set at the job level so every step inherits it;
      # individual steps may override or re-export as needed.
      VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout (with all submodules — nanobind, etc.)
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ------------------------------------------------------------------ #
      # 2. System dependencies
      #    - Vulkan: libvulkan-dev (headers + loader), mesa-vulkan-drivers
      #              (lavapipe ICD), vulkan-tools (vulkaninfo for debug)
      #    - Shader tools: glslc (from shaderc), spirv-tools (spirv-val)
      #    - Math: liblapack-dev + libblas-dev (Accelerate is macOS-only;
      #            CMake falls back to LAPACK/BLAS automatically on Linux)
      #    - Build: cmake, ninja-build, python3, pip, python3-dev
      # ------------------------------------------------------------------ #
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake \
            ninja-build \
            python3 \
            python3-pip \
            python3-dev \
            libvulkan-dev \
            vulkan-tools \
            glslc \
            spirv-tools \
            mesa-vulkan-drivers \
            libblas-dev \
            liblapack-dev \
            liblapacke-dev \
            pkg-config

      # ------------------------------------------------------------------ #
      # 3. Confirm lavapipe ICD is discoverable
      #    vulkaninfo exits non-zero on headless runners without a display
      #    — suppress the exit code but print the summary for debugging.
      # ------------------------------------------------------------------ #
      - name: Verify Vulkan ICD (lavapipe)
        run: |
          echo "VK_ICD_FILENAMES=${VK_ICD_FILENAMES}"
          ls -la /usr/share/vulkan/icd.d/ || true
          vulkaninfo --summary 2>&1 || echo "[INFO] vulkaninfo exited non-zero (normal on headless runner)"

      # ------------------------------------------------------------------ #
      # 4. Cache CMake build artefacts to speed up subsequent runs.
      #    Key includes the full CMakeLists hash so any build-system change
      #    invalidates the cache.
      # ------------------------------------------------------------------ #
      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: mlx-src/build_vulkan
          key: cmake-vulkan-${{ runner.os }}-${{ hashFiles('mlx-src/CMakeLists.txt', 'mlx-src/mlx/backend/vulkan/CMakeLists.txt') }}
          restore-keys: |
            cmake-vulkan-${{ runner.os }}-

      # ------------------------------------------------------------------ #
      # 5. CMake configure
      #    Flags explained:
      #      MLX_BUILD_VULKAN=ON   — enable Vulkan backend
      #      MLX_BUILD_METAL=OFF   — Metal is macOS-only
      #      MLX_BUILD_CPU=ON      — keep CPU fallback paths (linalg, etc.)
      #      MLX_BUILD_TESTS=OFF   — skip C++ unit-test build (saves time)
      #      MLX_BUILD_EXAMPLES=OFF
      #      MLX_BUILD_PYTHON_BINDINGS=ON — produce core.cpython-*.so
      #      MLX_BUILD_PYTHON_STUBS=OFF   — skip stub generation (no display)
      #    LAPACK/BLAS are found automatically by CMake's find_package on
      #    Linux once liblapack-dev and libblas-dev are installed.
      # ------------------------------------------------------------------ #
      - name: Configure CMake
        working-directory: mlx-src
        run: |
          cmake -B build_vulkan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMLX_BUILD_VULKAN=ON \
            -DMLX_BUILD_METAL=OFF \
            -DMLX_BUILD_CPU=ON \
            -DMLX_BUILD_TESTS=OFF \
            -DMLX_BUILD_EXAMPLES=OFF \
            -DMLX_BUILD_PYTHON_BINDINGS=ON \
            -DMLX_BUILD_PYTHON_STUBS=OFF \
            -DMLX_BUILD_BENCHMARKS=OFF

      # ------------------------------------------------------------------ #
      # 6. Build
      # ------------------------------------------------------------------ #
      - name: Build
        working-directory: mlx-src
        run: cmake --build build_vulkan -j$(nproc)

      # ------------------------------------------------------------------ #
      # 7. Copy Python extension into the importable package tree.
      #    On Linux the suffix follows PEP 3149 — cpython-3NN-x86_64-linux-gnu.so.
      #    We use a glob so we do not hard-code the exact Python minor version.
      # ------------------------------------------------------------------ #
      - name: Install Python extension into package
        working-directory: mlx-src
        run: |
          SOFILE=$(find build_vulkan -maxdepth 1 -name 'core.cpython-*.so' | head -1)
          if [ -z "$SOFILE" ]; then
            echo "ERROR: could not find core.cpython-*.so in build_vulkan/"
            ls build_vulkan/
            exit 1
          fi
          echo "Found: $SOFILE"
          cp "$SOFILE" python/mlx/
          echo "Copied to python/mlx/$(basename $SOFILE)"

      # ------------------------------------------------------------------ #
      # 8. Validate all SPIR-V shaders with spirv-val.
      #    Fails if any shader is invalid; lists each result individually.
      # ------------------------------------------------------------------ #
      - name: Validate SPIR-V shaders
        working-directory: mlx-src
        run: |
          FAIL=0
          COUNT=0
          for spv in build_vulkan/mlx/backend/vulkan/kernels/*.spv; do
            COUNT=$((COUNT + 1))
            if spirv-val "$spv"; then
              echo "OK : $(basename $spv)"
            else
              echo "FAIL: $(basename $spv)"
              FAIL=$((FAIL + 1))
            fi
          done
          echo "---"
          echo "SPIR-V validation: $((COUNT - FAIL))/$COUNT passed"
          [ $FAIL -eq 0 ] && echo "All shaders valid." || exit 1

      # ------------------------------------------------------------------ #
      # 9. Smoke test — runs basic CPU ops that always work, then attempts
      #    GPU device detection. The GPU block is wrapped in try/except so
      #    the job does NOT fail if lavapipe is unavailable or crashes on
      #    a specific host; instead it prints a clear skip notice.
      #
      #    NOTE: lavapipe supports Vulkan 1.3 but NOT VK_EXT_external_memory_host
      #    (which is MoltenVK/macOS-specific). The device_info() call is safe.
      # ------------------------------------------------------------------ #
      - name: Smoke test (CPU ops + GPU device probe)
        working-directory: mlx-src
        env:
          PYTHONPATH: python
        run: |
          python3 - <<'PYEOF'
          import sys, traceback
          import mlx.core as mx

          print("mlx imported OK")
          print(f"mlx default device: {mx.default_device()}")

          # --- CPU ops (must always pass) ---
          a = mx.array([1.0, 2.0, 3.0])
          b = mx.array([4.0, 5.0, 6.0])
          c = a + b
          mx.eval(c)
          result = c.tolist()
          assert result == [5.0, 7.0, 9.0], f"CPU add FAIL: {result}"
          print(f"CPU add: {result}  PASS")

          m1 = mx.ones((2, 3))
          m2 = mx.ones((3, 2))
          mm = mx.matmul(m1, m2)
          mx.eval(mm)
          assert mm[0, 0].item() == 3.0, f"CPU matmul FAIL: {mm.tolist()}"
          print(f"CPU matmul [0,0]: {mm[0,0].item()}  PASS")

          s = mx.sum(mx.ones((8,)))
          mx.eval(s)
          assert s.item() == 8.0, f"CPU sum FAIL: {s.item()}"
          print(f"CPU sum(ones(8)): {s.item()}  PASS")

          # --- GPU device probe (best-effort; skipped if Vulkan unavailable) ---
          try:
              info = mx.metal.device_info() if hasattr(mx, 'metal') else None
          except Exception:
              info = None

          # Try GPU stream add (exercises the Vulkan dispatch path)
          try:
              gpu_stream = mx.gpu
              x = mx.array([1.0, 2.0], stream=gpu_stream)
              y = mx.array([3.0, 4.0], stream=gpu_stream)
              z = x + y
              mx.eval(z)
              gpu_result = z.tolist()
              assert gpu_result == [4.0, 6.0], f"GPU add unexpected result: {gpu_result}"
              print(f"GPU add (lavapipe): {gpu_result}  PASS")
          except Exception as e:
              print(f"[SKIP] GPU dispatch not available (lavapipe limitation or no device): {e}")
              print("[INFO] This is expected on GitHub-hosted runners without a physical GPU.")

          print("Smoke test: DONE")
          PYEOF

      # ------------------------------------------------------------------ #
      # 10. Stage test suite (Python stages 7–23)
      #     Each stage is run with a 60-second timeout. Failures are
      #     collected; the job fails at the end if any stage fails.
      #     Stages that require GPU dispatch are expected to produce partial
      #     results on lavapipe — this is logged and not treated as fatal
      #     unless the stage completely errors out (import failure, crash).
      #
      #     The tests live in tests/vulkan/ (relative to the repo root,
      #     which is one level above mlx-src/).
      # ------------------------------------------------------------------ #
      - name: Run Vulkan stage test suite
        working-directory: mlx-src
        env:
          PYTHONPATH: python
        run: |
          PASS_STAGES=0
          FAIL_STAGES=0
          STAGE_RESULTS=""

          TEST_DIR="../tests/vulkan"

          # Collect all Python stage tests (stages 7+; stages 1-3 are shell scripts)
          STAGE_TESTS=$(ls ${TEST_DIR}/test_stage*.py 2>/dev/null | sort)

          if [ -z "$STAGE_TESTS" ]; then
            echo "ERROR: No test_stage*.py files found in ${TEST_DIR}"
            exit 1
          fi

          for f in $STAGE_TESTS; do
            name=$(basename "$f")
            echo ""
            echo "--- Running: $name ---"
            # timeout 60s per stage; capture combined stdout+stderr
            if timeout 60 python3 "$f" 2>&1; then
              echo "[PASS] $name"
              PASS_STAGES=$((PASS_STAGES + 1))
              STAGE_RESULTS="${STAGE_RESULTS}\n  PASS  $name"
            else
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "[TIMEOUT] $name (>60s)"
                STAGE_RESULTS="${STAGE_RESULTS}\n  TIMEOUT $name"
              else
                echo "[FAIL] $name (exit $EXIT_CODE)"
                STAGE_RESULTS="${STAGE_RESULTS}\n  FAIL  $name (exit $EXIT_CODE)"
              fi
              FAIL_STAGES=$((FAIL_STAGES + 1))
            fi
          done

          TOTAL=$((PASS_STAGES + FAIL_STAGES))
          echo ""
          echo "=============================="
          echo "Stage Test Summary: $PASS_STAGES/$TOTAL passed"
          echo "=============================="
          echo -e "$STAGE_RESULTS"

          # Fail the job if more than half the stages failed (allows for
          # lavapipe-specific GPU dispatch failures on a subset of tests).
          if [ $FAIL_STAGES -gt $((TOTAL / 2)) ]; then
            echo ""
            echo "ERROR: Too many stage failures ($FAIL_STAGES/$TOTAL). CI FAIL."
            exit 1
          fi

          echo ""
          echo "Stage test suite complete."

      # ------------------------------------------------------------------ #
      # 11. Upload build artefacts for debugging failed runs.
      #     Only uploaded on failure so storage is not wasted on success.
      # ------------------------------------------------------------------ #
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            mlx-src/build_vulkan/CMakeFiles/CMakeError.log
            mlx-src/build_vulkan/CMakeFiles/CMakeOutput.log
          retention-days: 7

# ------------------------------------------------------------------ #
# NOTE: GPU hardware testing requires a self-hosted runner.
#
# To enable real GPU testing (AMD/NVIDIA), add a runner with tag
# 'self-hosted,gpu' and create a second job:
#
#   build-and-test-gpu:
#     name: Build & Test (self-hosted GPU)
#     runs-on: [self-hosted, gpu]
#     needs: build-and-test   # only run after software build passes
#     steps:
#       ... same steps but without VK_ICD_FILENAMES override ...
#
# Lavapipe does NOT support VK_EXT_external_memory_host or
# cooperative matrix extensions. Those paths will silently fall back
# or be skipped on this job.
# ------------------------------------------------------------------ #
